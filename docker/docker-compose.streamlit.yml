# docker/docker-compose.streamlit.yml
version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    container_name: sec_filing_streamlit
    ports:
      - "8501:8501"
    environment:
      - SEC_EMAIL=${SEC_EMAIL:-mohsinmahmood675@gmail.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app
      - FILINGS_DIR=/app/sec-edgar-filings
    volumes:
      - ../sec-edgar-filings:/app/sec-edgar-filings
      - ../data/db:/app/data/db
      - ../embeddings/chromadb:/app/embeddings/chromadb
    command: streamlit run streamlit_app.py
    restart: unless-stopped